<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">


    <title>Login</title>
    <style>
        :root {
            --primary: #e30613;
            --primary-dark: #b5000a;
            --secondary: #003366;
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d7dde5;
            --success-bg: #e8f8ee;
            --success-text: #0f7a38;
            --error-bg: #fdecec;
            --error-text: #b42318;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(227, 6, 19, 0.08), transparent 24%),
                linear-gradient(180deg, #ffffff 0%, #f4f6f8 100%);
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, #e30613 60%, #003366 100%);
            color: #fff;
            padding: 24px 32px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-content {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-content h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .header-content p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.92;
        }

        main {
            flex: 1;
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 40px 20px 56px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 28px;
            align-items: center;
        }

        .intro-card {
            padding: 12px 8px 12px 4px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 14px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(227, 6, 19, 0.1);
            color: var(--primary);
            font-size: 0.86rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .intro-card h2 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
            color: var(--secondary);
        }

        .intro-card p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.7;
            max-width: 560px;
        }

        .form-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(215, 221, 229, 0.7);
            padding: 28px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .form-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .form-card img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            margin-bottom: 16px;
        }

        .form-card h3 {
            margin: 0 0 8px;
            font-size: 1.6rem;
            color: var(--secondary);
        }

        .form-card .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .field {
            display: grid;
            gap: 8px;
            text-align: left;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 0.94rem;
            font-weight: 600;
            color: #344054;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            padding: 14px 15px;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
            border-color: rgba(227, 6, 19, 0.7);
            box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.12);
        }

        .submit-btn {
            width: 100%;
            min-height: 52px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 12px 22px rgba(227, 6, 19, 0.22);
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }

        .toast-container {
            position: fixed;
            top: 22px;
            right: 22px;
            z-index: 1000;
            display: grid;
            gap: 12px;
            width: min(380px, calc(100vw - 24px));
        }

        .toast {
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
            border: 1px solid transparent;
            transform: translateX(120%);
            opacity: 0;
            animation: slideIn 0.45s ease forwards;
        }

        .toast.success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: rgba(15, 122, 56, 0.18);
        }

        .toast.error {
            background: var(--error-bg);
            color: var(--error-text);
            border-color: rgba(180, 35, 24, 0.18);
        }

        .toast strong {
            display: block;
            margin-bottom: 4px;
            font-size: 0.96rem;
        }

        .toast span {
            font-size: 0.92rem;
            line-height: 1.45;
        }

        .toast.hide {
            animation: slideOut 0.35s ease forwards;
        }

        footer {
            padding: 16px 20px 24px;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @media (max-width: 920px) {
            main {
                grid-template-columns: 1fr;
                padding-top: 28px;
            }

            .intro-card {
                padding: 0;
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 20px 18px 16px;
            }

            .header-content h1 {
                font-size: 1.6rem;
            }

            .form-card {
                padding: 22px 18px;
            }

            .toast-container {
                left: 12px;
                right: 12px;
                width: auto;
            }
        }
    </style>
</head>

<body>

    <script>
        if (!sessionStorage.getItem('splashShown')) {
            sessionStorage.setItem('splashShown', 'true');
            window.location.href = 'spashscreen.html';
        }
    </script>
    <div class="toast-container" id="toastContainer"></div>

    <header>
        <div class="header-content">
            <h1>Login</h1>
            <p>Acesse com seu e-mail e senha.</p>
        </div>
    </header>

    <main>
        <section class="intro-card">
            <span class="eyebrow">Acesso ao Sistema</span>
            <h2>Seja Bem-Vindo(a)</h2>
            <p>Faça login para continuar e acessar o painel com suas permissões.</p>
        </section>

        <section class="form-card">
            <img src="assets/br.gov.sp.cptm.mobile-logo.png" alt="Logo">
            <h3>Entrar</h3>
            <p class="subtitle">Informe suas credenciais para acessar.</p>

            <form>
                <div class="field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="field">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <button type="submit" id="enviar" class="submit-btn">
                    <span class="spinner" aria-hidden="true"></span>
                    <span id="submitText">LOGIN</span>
                </button>
            </form>
        </section>
    </main>

    <footer>
        2026. Todos os direitos reservados.
    </footer>

    <script>
        const submitBtn = document.getElementById("enviar");
        const submitText = document.getElementById("submitText");
        const toastContainer = document.getElementById("toastContainer");

        function showToast(type, title, message) {
            const toast = document.createElement("div");
            toast.className = "toast " + type;
            toast.innerHTML = "<strong>" + title + "</strong><span>" + message + "</span>";

            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.add("hide");
            }, 3200);

            setTimeout(() => {
                toast.remove();
            }, 3600);
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.classList.toggle("loading", isLoading);
            submitText.textContent = isLoading ? "Entrando..." : "LOGIN";
        }

        function dadosLogin() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            return { email, senha };
        }

        const login = async (email, senha) => {
            try {
                const response = await fetch('https://localhost:7134/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        Email: email,
                        Senha: senha
                    })
                });

                if (!response.ok) {
                    throw new Error("HTTP error! status: " + response.status);
                }

                const data = await response.json();
                console.log('Sucesso:', data);

                if (data.token) {
                    localStorage.setItem('jwtToken', data.token);
                } else {
                    showToast("error", "Erro de autenticação", "Token não recebido. Verifique o backend.");
                    return;
                }

                let usuario = email;
                try {
                    const payload = JSON.parse(atob(data.token.split(".")[1]));
                    usuario = payload.nome || payload.name || payload.unique_name || payload.email || email;
                } catch (_) { }

                showToast("success", "Login realizado", "Seja Bem-Vindo(a), " + usuario);

                setTimeout(() => {
                    window.location.href = 'menu_cards copy.html';
                }, 1200);

                return data.token;

            } catch (error) {
                console.error('Erro:', error);
                if (error.message.includes('HTTP error')) {
                    showToast("error", "Falha no login", "Erro ao fazer login: " + error.message);
                } else {
                    showToast("error", "Falha no login", "Ocorreu um erro ao tentar fazer login. Por favor, tente novamente.");
                }
            }
        }

        document.getElementById("enviar").addEventListener("click", async (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            if (!email || !senha) {
                showToast("error", "Campos obrigatórios", "Preencha e-mail e senha para continuar.");
                return;
            }

            setLoading(true);

            try {
                const token = await login(email, senha);

                if (token) {
                    localStorage.setItem("token", token);
                }
            } finally {
                setLoading(false);
            }
        });

        // inicializa os listeners ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw2.js')
                    .then(reg => console.log('ServiceWorker registrado:', reg.scope))
                    .catch(err => console.error('Falha ao registrar SW:', err));
            }

        });


    </script>
</body>

</html>
