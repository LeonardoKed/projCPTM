<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="/manifest.json">
  <title>Painel</title>
  <style>
    :root {
      --primary: #e30613;
      --primary-dark: #b5000a;
      --secondary: #003366;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7dde5;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(227, 6, 19, 0.08), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, #f4f6f8 100%);
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(90deg, #e30613 60%, #003366 100%);
      color: #fff;
      padding: 24px 32px 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .header-content {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .welcome-text {
      margin: 4px 0 0;
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-1px);
    }

    main {
      flex: 1;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 36px 20px 56px;
      display: grid;
      gap: 24px;
    }

    .cards-shell {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 221, 229, 0.7);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .cards-shell::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .cards-title {
      margin: 0 0 6px;
      color: var(--secondary);
      font-size: 1.7rem;
    }

    .cards-subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      border: 1px solid #e6eaf0;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      min-height: 220px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      border-color: rgba(227, 6, 19, 0.35);
      box-shadow: 0 12px 30px rgba(227, 6, 19, 0.12);
      transform: translateY(-2px);
    }

    .card-icon-wrap {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: rgba(227, 6, 19, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(227, 6, 19, 0.12);
      overflow: hidden;
    }

    .card-icon {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
    }

    .card h3 {
      margin: 0;
      font-size: 1.04rem;
      color: var(--secondary);
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card button {
      width: 100%;
      min-height: 44px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(227, 6, 19, 0.18);
    }

    .card button:hover {
      transform: translateY(-1px);
    }

    footer {
      padding: 16px 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 1050px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 20px 18px 16px;
      }

      .header-left h1 {
        font-size: 1.6rem;
      }

      .cards-shell {
        padding: 22px 18px;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-content">
      <div class="header-left">
        <h1>Painel</h1>
        <p class="welcome-text" id="welcomeUser">Seja Bem-Vindo(a), Usuário</p>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <section class="cards-shell">
      <h2 class="cards-title">Ações do Sistema</h2>
      <p class="cards-subtitle">Escolha uma opção para continuar.</p>

      <div class="cards">

        <div class="card">
          <div class="card-icon-wrap">
            <img src="assets/exam.png" alt="Ícone formulário" class="card-icon" />
          </div>
          <h3>Iniciar Inspeção</h3>
          <button type="button" id="openFormsBtn">Acessar</button>
        </div>

        <!-- onclick="window.location.href='Forms copy.html'" -->

        <div class="card">
          <div class="card-icon-wrap">
            <img src="assets/inspection.png" alt="Ícone consulta" class="card-icon" />
          </div>
          <h3>Consultar Inspeções</h3>
          <button type="button" onclick="abrirConsultaSegunRole()">Acessar</button>
        </div>

        <div id="cardCadastrarUsuario" class="card" style="display: none;">
          <div class="card-icon-wrap">
            <img src="assets/add-user1.png" alt="Ícone cadastro usuário" class="card-icon" />
          </div>
          <h3>Cadastrar Usuário</h3>
          <button type="button" onclick="verificarAdminERedirecionar()">Cadastrar</button>
        </div>

        <div id="cardListarUsuario" class="card" style="display: none;">
          <div class="card-icon-wrap">
            <img src="assets/list.png" alt="Ícone listagem usuário" class="card-icon" />
          </div>
          <h3>Listar Usuários</h3>
          <button type="button" onclick="verificarAdminERedirecionarListarUsers()">Listar</button>
        </div>

        <div class="card">
          <div class="card-icon-wrap">
            <img src="assets/gear.png" alt="Ícone consulta" class="card-icon" />
          </div>
          <h3>Meu Perfil</h3>
          <button type="button" id="profileBtn">Acessar</button>
        </div>

      </div>
    </section>
  </main>

  <footer>
    &copy; 2026. Todos os direitos reservados.
  </footer>

  <script>

    // Verifica se o token JWT está presente
    const token = localStorage.getItem('jwtToken');

    function parseJwt(token) {
      if (!token) return null;
      token = token.replace(/^Bearer\s+/i, '');
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      const payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      const pad = payload.length % 4;
      const padded = payload + (pad ? '='.repeat(4 - pad) : '');
      try {
        const json = decodeURIComponent(atob(padded).split('').map(c => {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(json);
      } catch {
        return null;
      }
    }

    document.getElementById('profileBtn')?.addEventListener('click', () => {
      const token = localStorage.getItem('token') || sessionStorage.getItem('token');
      if (!token) {
        // redireciona para login se não autenticado
        window.location.href = '/login.html';
        return;
      }

      const payload = parseJwt(token);
      const userId = payload?.usuario_id ?? payload?.sub ?? payload?.id ?? null;

      if (!userId) {
        // fallback: mostrar mensagem ou buscar /api/me no backend
        showMessage('ID do usuário não encontrado no token.', 'error');
        return;
      }

      // redireciona para /perfil/{id}
      window.location.href = `/perfil.html#/${encodeURIComponent(userId)}`;
    });


    if (!token) {
      // Redireciona para a página de login se o token não existir
      //alert('Você precisa estar logado para acessar esta página.');
      window.location.href = 'index copy.html';
    } else {
      try {
        // Decodifica o token para verificar a validade (opcional)
        const payload = JSON.parse(atob(token.split('.')[1])); // Decodifica o payload do JWT
        const currentTime = Date.now() / 1000; // Tempo atual em segundos


        if (payload.exp && payload.exp < currentTime) {
          // Token expirado
          alert('Sua sessão expirou. Faça login novamente.');
          localStorage.removeItem('jwtToken'); // Remove o token expirado
          window.location.href = 'index copy.html';
        }

        const nomeUsuario = payload.nome || payload.name || payload.unique_name || payload.email || "Usuário";
        document.getElementById("welcomeUser").textContent = "Seja Bem-Vindo(a), " + nomeUsuario;

      } catch (error) {
        console.error('Erro ao validar o token:', error);
        alert('Token inválido. Faça login novamente.');
        localStorage.removeItem('jwtToken'); // Remove o token inválido
        window.location.href = 'index copy.html';
      }
    }


    function logout() {

      //localStorage.removeItem('jwtToken');
      alert('Você foi desconectado.');
      window.location.href = 'index copy.html'; // Redireciona para a página de login

    }

    //Função para abrir o formulário de cadastro (pode ser adaptada para abrir um modal ou redirecionar para outra página)
    if (token) {
      const payload = JSON.parse(atob(token.split('.')[1])); // Decodifica o payload do JWT
      const userRole = payload.role; // Obtém o perfil do usuário

      if (userRole === 'admin') {
        // Exibe o card de "Cadastrar Usuário"
        document.getElementById('cardCadastrarUsuario').style.display = 'flex';
        document.getElementById('cardListarUsuario').style.display = 'flex';
      } else {
        // Oculta o card para usuários normais
        document.getElementById('cardCadastrarUsuario').style.display = 'none';
        document.getElementById('cardListarUsuario').style.display = 'none';
      }
    }



    function verificarAdminERedirecionar() {
      const token = localStorage.getItem("jwtToken");

      if (!token) {
        alert("Você precisa estar autenticado para acessar esta funcionalidade.");
        return;
      }

      // Decodificar o token JWT
      const payload = JSON.parse(atob(token.split('.')[1])); // Decodifica o payload do JWT

      // Verificar se o usuário tem a role "admin"
      if (payload.role === "admin") {
        // Redirecionar para a página de cadastro
        window.location.href = "cadastroUser.html";
      } else {
        alert("Acesso negado. Apenas administradores podem acessar esta funcionalidade.");
      }
    }
    function verificarAdminERedirecionarListarUsers() {
      const token = localStorage.getItem("jwtToken");

      if (!token) {
        alert("Você precisa estar autenticado para acessar esta funcionalidade.");
        return;
      }

      // Decodificar o token JWT
      const payload = JSON.parse(atob(token.split('.')[1])); // Decodifica o payload do JWT

      // Verificar se o usuário tem a role "admin"
      if (payload.role === "admin") {
        // Redirecionar para a página de cadastro
        window.location.href = "listaUsers.html";
      } else {
        alert("Acesso negado. Apenas administradores podem acessar esta funcionalidade.");
      }
    }

    // inicializa os listeners ao carregar a página
    document.addEventListener('DOMContentLoaded', () => {

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw2.js')
          .then(reg => console.log('ServiceWorker registrado:', reg.scope))
          .catch(err => console.error('Falha ao registrar SW:', err));
      }

      const aba = document.querySelector('#minhaAba');
      if (aba) aba.addEventListener('click', trySyncFromPage);

    });

    document.getElementById('openFormsBtn')?.addEventListener('click', (e) => {
      // tenta sincronizar e navega imediatamente (não bloqueia espera)
      trySyncFromPage();
      // pequena espera opcional para ver logs (50ms), remova se quiser navegação imediata
      setTimeout(() => window.location.href = 'Forms copy.html', 50);
    });


    async function trySyncFromPage() {
      if (!('serviceWorker' in navigator)) return;
      try {
        const reg = await navigator.serviceWorker.ready;
        if (reg.active) {
          reg.active.postMessage('try-sync');
          console.log('request sent to SW: try-sync');
        }
      } catch (e) { console.error('trySyncFromPage error', e); }
    }


    function abrirConsultaSegunRole() {
      const token = localStorage.getItem('jwtToken') || localStorage.getItem('token');
      if (!token) {
        window.location.href = 'index copy.html';
        return;
      }
      const payload = parseJwt(token);
      const role = payload?.role || payload?.roles || payload?.roleName || null;
      if (role === 'admin') {
        window.location.href = 'listaFormsAdm.html';
      } else {
        window.location.href = 'listaFormsUser copy.html';
      }
    }






  </script>

</body>

</html>
