<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
        --primary: #e30613;
        --primary-dark: #b5000a;
        --secondary: #003366;
        --bg: #f4f6f8;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #d7dde5;
        --success-bg: #e8f8ee;
        --success-text: #0f7a38;
        --error-bg: #fdecec;
        --error-text: #b42318;
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        --radius: 18px;
        }

        * {
        box-sizing: border-box;
        }

        body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at top right, rgba(227, 6, 19, 0.08), transparent 24%),
            linear-gradient(180deg, #ffffff 0%, #f4f6f8 100%);
        display: flex;
        flex-direction: column;
        }

        header {
        background: linear-gradient(90deg, #e30613 60%, #003366 100%);
        color: #fff;
        padding: 24px 32px 18px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-content {
        width: min(1120px, 100%);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        }

        .header-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
        }

        .header-title h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.4px;
        }

        .header-title p {
        margin: 0;
        font-size: 0.95rem;
        opacity: 0.92;
        }

        .logout-btn {
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        padding: 10px 18px;
        border-radius: 999px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
        }

        .logout-btn:hover {
        background: rgba(255, 255, 255, 0.22);
        transform: translateY(-1px);
        }

        main {
        flex: 1;
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 40px 20px 56px;
        display: grid;
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 28px;
        align-items: start;
        }

        .intro-card {
        padding: 12px 8px 12px 4px;
        display: none; /* removido visualmente para manter compatibilidade */
        }

        .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(227, 6, 19, 0.1);
        color: var(--primary);
        font-size: 0.86rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        }

        .intro-card h2 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
        color: var(--secondary);
        }

        .intro-card p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
        max-width: 560px;
        }

        .highlights {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        }

        .highlight {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(0, 51, 102, 0.08);
        border-radius: 16px;
        padding: 16px 18px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
        }

        .highlight strong {
        display: block;
        margin-bottom: 6px;
        color: var(--secondary);
        font-size: 0.98rem;
        }

        .highlight span {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
        }

        .form-card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid rgba(215, 221, 229, 0.7);
        padding: 28px;
        position: relative;
        overflow: hidden;
        width: min(680px, 100%);
        justify-self: center;
        }

        .form-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 5px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .form-card h3 {
        margin: 0 0 8px;
        font-size: 1.6rem;
        color: var(--secondary);
        }

        .form-card .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 0.96rem;
        }

        .form-grid {
        display: grid;
        gap: 16px;
        }

        .field {
        display: grid;
        gap: 8px;
        }

        .field label {
        font-size: 0.94rem;
        font-weight: 600;
        color: #344054;
        }

        .field input,
        .field select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 14px 15px;
        font-size: 1rem;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus,
        .field select:focus {
        border-color: rgba(227, 6, 19, 0.7);
        box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.12);
        }

        .actions {
        margin-top: 10px;
        }

        .submit-btn {
        width: 100%;
        min-height: 52px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 12px 22px rgba(227, 6, 19, 0.22);
        }

        .submit-btn:hover {
        transform: translateY(-1px);
        }

        .submit-btn:disabled {
        cursor: not-allowed;
        opacity: 0.85;
        transform: none;
        }

        .spinner {
        width: 18px;
        height: 18px;
        border: 2.5px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
        }

        .submit-btn.loading .spinner {
        display: inline-block;
        }

        .toast-container {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 1000;
        display: grid;
        gap: 12px;
        width: min(380px, calc(100vw - 24px));
        }

        .toast {
        border-radius: 16px;
        padding: 16px 18px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        border: 1px solid transparent;
        transform: translateX(120%);
        opacity: 0;
        animation: slideIn 0.45s ease forwards;
        }

        .toast.success {
        background: var(--success-bg);
        color: var(--success-text);
        border-color: rgba(15, 122, 56, 0.18);
        }

        .toast.error {
        background: var(--error-bg);
        color: var(--error-text);
        border-color: rgba(180, 35, 24, 0.18);
        }

        .toast strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.96rem;
        }

        .toast span {
        font-size: 0.92rem;
        line-height: 1.45;
        }

        .toast.hide {
        animation: slideOut 0.35s ease forwards;
        }

        footer {
        padding: 16px 20px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 0.92rem;
        }

        @keyframes spin {
        to {
            transform: rotate(360deg);
        }
        }

        @keyframes slideIn {
        from {
            transform: translateX(120%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
        }

        @keyframes slideOut {
        from {
            transform: translateX(0);
            opacity: 1;
        }
        to {
            transform: translateX(120%);
            opacity: 0;
        }
        }

        @media (max-width: 920px) {
        main {
            grid-template-columns: 1fr;
            padding-top: 28px;
        }

        .intro-card {
            padding: 0;
        }
        }

        @media (max-width: 600px) {
        header {
            padding: 20px 18px 16px;
        }

        .header-content {
            flex-direction: column;
            align-items: flex-start;
        }

        .header-title h1 {
            font-size: 1.6rem;
        }

        .form-card {
            padding: 22px 18px;
        }

        .highlights {
            grid-template-columns: 1fr;
        }

        .toast-container {
            left: 12px;
            right: 12px;
            width: auto;
        }
        }

    </style>
</head>



<body>

    <div class="toast-container" id="toastContainer"></div>

    <header>
        <div class="header-content">
        <div class="header-title">
            <h1>Cadastro de Usuário</h1>
            <p>Criação de contas com controle de perfil e acesso administrativo.</p>
        </div>
        <button class="logout-btn" type="button" onclick="Voltar()">Voltar</button>
        </div>
    </header>

    <main>
        
        <section class="form-card">
        <h3>Novo usuário</h3>
        <p class="subtitle">Informe os dados básicos e defina o perfil de acesso.</p>

        <form id="registerUserForm">
            <div class="form-grid">
            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required />
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="usuario@email.com" required />
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite a senha" required minlength="6" />
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil" required>
                <option value="" disabled selected>Selecione um perfil</option>
                <option value="normal">normal</option>
                <option value="admin">admin</option>
                </select>
            </div>
            </div>

            <div class="actions">
            <button class="submit-btn" id="submitBtn" type="submit">
                <span class="spinner" aria-hidden="true"></span>
                <span id="submitText">Cadastrar usuário</span>
            </button>
            </div>
        </form>
        </section>
    </main>

    <footer>
        2026. Todos os direitos reservados.
    </footer>

    <script>

        const token = localStorage.getItem("jwtToken");
        const form = document.getElementById("registerUserForm");
        const submitBtn = document.getElementById("submitBtn");
        const submitText = document.getElementById("submitText");
        const toastContainer = document.getElementById("toastContainer");

        function showToast(type, title, message) {
        const toast = document.createElement("div");
        toast.className = "toast " + type;
        toast.innerHTML = "<strong>" + title + "</strong><span>" + message + "</span>";

        toastContainer.appendChild(toast);

        setTimeout(() => {
            toast.classList.add("hide");
        }, 3200);

        setTimeout(() => {
            toast.remove();
        }, 3600);
        }

        function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.classList.toggle("loading", isLoading);
        submitText.textContent = isLoading ? "Cadastrando..." : "Cadastrar usuário";
        }

        function Voltar() {

        window.location.href = 'menu_cards copy.html'; // Redireciona para a página de menu

        }

        function logout() {
        localStorage.removeItem("jwtToken");
        window.location.href = "index copy.html";
        }

        function validateAccess() {
        if (!token) {
            showToast("error", "Acesso negado", "Você precisa estar logado para acessar esta página.");
            setTimeout(() => {
            window.location.href = "index copy.html";
            }, 1200);
            return false;
        }

        try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            const currentTime = Date.now() / 1000;

            if (payload.exp && payload.exp < currentTime) {
            localStorage.removeItem("jwtToken");
            showToast("error", "Sessão expirada", "Faça login novamente.");
            setTimeout(() => {
                window.location.href = "index copy.html";
            }, 1200);
            return false;
            }

            if (payload.role !== "admin") {
            showToast("error", "Permissão insuficiente", "Somente administradores podem cadastrar usuários.");
            setTimeout(() => {
                window.location.href = "menu_cards copy.html";
            }, 1400);
            return false;
            }

            return true;
        } catch (error) {
            localStorage.removeItem("jwtToken");
            showToast("error", "Token inválido", "Faça login novamente.");
            setTimeout(() => {
            window.location.href = "index copy.html";
            }, 1200);
            return false;
        }
        }

        async function cadastrarUsuario(dados) {
        const response = await fetch("https://localhost:7134/api/adm/addusuario", {
            method: "POST",
            headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
            Nome: dados.nome,
            Email: dados.email,
            Senha: dados.senha,
            Perfil: dados.perfil
            })
        });

        if (!response.ok) {
            let mensagem = "Não foi possível cadastrar o usuário.";
            try {
            const erro = await response.json();
            mensagem = erro.mensagem || erro.message || mensagem;
            } catch (_) {
            }
            throw new Error(mensagem);
        }

        try {
            return await response.json();
        } catch (_) {
            return { mensagem: "Usuário cadastrado com sucesso." };
        }
        }

        validateAccess();

        form.addEventListener("submit", async function (event) {
        event.preventDefault();

        const dados = {
            nome: document.getElementById("nome").value.trim(),
            email: document.getElementById("email").value.trim(),
            senha: document.getElementById("senha").value,
            perfil: document.getElementById("perfil").value
        };

        if (!dados.nome || !dados.email || !dados.senha || !dados.perfil) {
            showToast("error", "Campos obrigatórios", "Preencha todos os campos antes de continuar.");
            return;
        }

        setLoading(true);

        try {
            const resultado = await cadastrarUsuario(dados);
            showToast("success", "Cadastro realizado", resultado.mensagem || "Usuário cadastrado com sucesso.");
            form.reset();
        } catch (error) {
            showToast("error", "Erro no cadastro", error.message || "Ocorreu um erro ao enviar os dados.");
        } finally {
            setLoading(false);
        }
        });




        /*
        //Função para abrir o formulário de cadastro (pode ser adaptada para abrir um modal ou redirecionar para outra página)
        if (token) {
            const payload = JSON.parse(atob(token.split('.')[1])); // Decodifica o payload do JWT
            const userRole = payload.role; // Obtém o perfil do usuário

            if (userRole === 'admin') {
                // Exibe o card de "Cadastrar Usuário"
                document.getElementById('cardCadastrarUsuario').style.display = 'block';
            } else {
                // Oculta o card para usuários normais
                document.getElementById('cardCadastrarUsuario').style.display = 'none';
            }
        }
            */


    </script>
    
</body>

</html>
